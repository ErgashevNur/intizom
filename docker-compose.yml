version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: intizom-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-intizom}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-intizom123}
      POSTGRES_DB: ${DB_NAME:-intizom}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intizom-backend
    env_file: .env
    ports:
      - '3000:3000'
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
